<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090e">
<title>Quest Log</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#08090e;--surface:#0d0f16;--card:#111520;--border:#1a1f2e;--border2:#1e2330;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;--text5:#334155;--accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--cyan:#06b6d4;--pink:#ec4899;--purple:#8b5cf6;--slate:#64748b}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'SF Pro Display',-apple-system,'Segoe UI',system-ui,sans-serif}
#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
input,textarea,button,select{font-family:inherit;outline:none}
button{cursor:pointer}

/* Top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,16px) 16px 10px;background:linear-gradient(180deg,var(--surface),var(--bg))}
.top-bar .brand{font-size:9px;letter-spacing:3px;color:var(--accent);font-weight:800;margin-bottom:4px}
.top-bar .date-title{font-size:19px;font-weight:700;color:#f1f5f9;letter-spacing:-0.3px}
.cal-btn{width:44px;height:44px;border-radius:12px;background:var(--card);border:1px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.cal-btn-month{font-size:10px;color:var(--accent);font-weight:700;line-height:1}
.cal-btn-day{font-size:18px;font-weight:800;color:#f1f5f9;line-height:1}

/* Day strip */
.day-nav{display:flex;align-items:center;justify-content:center;gap:2px;padding:4px 8px 8px}
.day-nav-btn{background:none;border:none;color:var(--text5);font-size:20px;padding:4px 8px}
.day-pill{display:flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:14px;border:none;background:transparent;color:var(--text3);min-width:40px;gap:1px;transition:all .15s}
.day-pill.active{background:var(--accent);color:#fff}
.day-pill .dw{font-size:9px;font-weight:600;letter-spacing:1px}
.day-pill .dn{font-size:17px;font-weight:700;line-height:1.2}
.day-pill .today-dot{width:4px;height:4px;border-radius:2px;background:var(--accent);margin-top:1px}
.day-pill.active .today-dot{background:#fff}

/* Progress */
.prog-area{padding:0 16px 8px}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.prog-label{font-size:10px;color:var(--text4);letter-spacing:1px}
.prog-val{font-size:10px;color:var(--text3);font-weight:600}
.prog-bar{height:3px;background:#141824;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s;background:linear-gradient(90deg,var(--accent),var(--accent3))}
.prog-fill.done{background:var(--green)}

/* Timeline */
.timeline{flex:1;overflow-y:auto;position:relative;-webkit-overflow-scrolling:touch}
.timeline-inner{position:relative}
.hour-row{position:absolute;left:0;right:0}
.hour-label{position:absolute;left:6px;top:-7px;font-size:10px;color:#1e2640;width:40px;text-align:right;font-weight:500}
.hour-line{position:absolute;left:50px;right:0;top:0;height:1px;background:var(--card)}
.now-line{position:absolute;left:48px;right:0;z-index:5;display:flex;align-items:center}
.now-dot{width:8px;height:8px;border-radius:4px;background:var(--red);flex-shrink:0}
.now-bar{flex:1;height:2px;background:var(--red)}
.ev-block{position:absolute;left:56px;right:8px;border-radius:8px;padding:6px 10px;cursor:pointer;border:none;text-align:left;overflow:hidden;transition:opacity .15s}
.ev-block .ev-row{display:flex;align-items:center;gap:6px}
.ev-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--text4);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ev-check.done{background:var(--green);border-color:var(--green)}
.ev-title{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-title.done{text-decoration:line-through}
.ev-meta{font-size:10px;color:var(--text3);margin-top:3px;padding-left:20px}
.ev-subs{font-size:10px;color:var(--text4);margin-top:2px;padding-left:20px}

/* Empty */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;color:var(--text3);font-weight:500}
.empty-sub{font-size:12px;color:var(--text4);margin-top:4px}

/* FAB */
.fab{position:absolute;bottom:28px;right:20px;width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:28px;font-weight:300;box-shadow:0 6px 28px rgba(99,102,241,.35);z-index:50;display:flex;align-items:center;justify-content:center}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:#262d3d;margin:0 auto 14px}

/* Sheet */
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:12px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.sheet-header{display:flex;gap:12px;padding:0 20px 14px;align-items:flex-start}
.big-check{background:none;border:none;padding:0;margin-top:2px}
.big-box{width:26px;height:26px;border-radius:7px;border:2px solid var(--text4);display:flex;align-items:center;justify-content:center;transition:all .15s}
.big-box.done{background:var(--green);border-color:var(--green)}
.sheet-title{font-size:19px;font-weight:700;color:#f1f5f9;line-height:1.3}
.sheet-title.done-text{text-decoration:line-through}
.sheet-timeline{font-size:12px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.est-badge{background:var(--border);padding:2px 8px;border-radius:4px;font-size:10px;color:var(--accent3);font-weight:600}
.sub-progress{font-size:11px;color:var(--green);margin-top:4px;font-weight:500}
.edit-btn{background:var(--card);border:1px solid var(--border2);color:var(--text2);width:36px;height:36px;border-radius:10px;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sheet-body{padding:0 20px 36px}
.section-label{font-size:9px;color:var(--text5);letter-spacing:2px;font-weight:800;margin-top:22px;margin-bottom:8px}

/* Description */
.desc-area{background:var(--card);border-radius:10px;padding:14px;min-height:44px;cursor:pointer;border:1px solid #141824}
.desc-placeholder{color:var(--text4);font-size:12px}
.desc-edit{width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:12px;border-radius:10px;font-family:'JetBrains Mono',monospace;resize:vertical;line-height:1.6}
.desc-actions{display:flex;gap:8px;margin-top:8px;justify-content:flex-end}
.desc-cancel{background:none;border:1px solid var(--border2);color:var(--text2);font-size:12px;padding:6px 16px;border-radius:8px}
.desc-save{background:var(--accent);border:none;color:#fff;font-size:12px;padding:6px 16px;border-radius:8px;font-weight:600}

/* Markdown */
.md-h1{font-size:16px;font-weight:700;color:#f1f5f9;margin:8px 0 4px}
.md-h2{font-size:14px;font-weight:700;color:var(--text);margin:6px 0 3px}
.md-h3{font-size:13px;font-weight:600;color:#cbd5e1;margin:4px 0 2px}
.md-p{font-size:12.5px;color:var(--text2);line-height:1.65;margin:2px 0}
.md-li{font-size:12.5px;color:var(--text2);line-height:1.65;padding-left:8px}
.md-code{font-size:11px;background:var(--border);color:var(--accent3);padding:8px 10px;border-radius:6px;display:block;margin:6px 0;white-space:pre-wrap;font-family:monospace;overflow-x:auto}
.md-inline{font-size:11px;background:var(--border);color:var(--accent3);padding:1px 5px;border-radius:3px;font-family:monospace}

/* Timer */
.timer-box{background:var(--card);border-radius:12px;padding:14px;border:1px solid #141824}
.timer-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mode-btn{background:var(--border);border:1px solid var(--border2);color:var(--accent3);font-size:11px;padding:5px 12px;border-radius:8px;font-weight:600}
.timer-total{font-size:11px;color:var(--text4)}
.countdown-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px}
.countdown-fill{height:100%;border-radius:3px;transition:width 1s linear}
.timer-controls{display:flex;align-items:center;justify-content:space-between}
.timer-display{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px;font-family:'SF Mono','JetBrains Mono',monospace;color:#f1f5f9}
.timer-display.finished{color:var(--red)}
.timer-btns{display:flex;gap:10px}
.t-btn{width:44px;height:44px;border-radius:50%;border:none;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center}

/* Alarm toggle */
.alarm-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:10px;padding:12px 14px;border:1px solid #141824}
.alarm-label{font-size:13px;color:var(--text);font-weight:500}
.alarm-sub{font-size:10px;color:var(--text3);margin-top:2px}
.toggle{width:44px;height:24px;border-radius:12px;border:none;padding:2px;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--accent)}
.toggle.off{background:var(--text5)}
.toggle-knob{width:20px;height:20px;border-radius:10px;background:#fff;transition:transform .2s}
.toggle.on .toggle-knob{transform:translateX(20px)}

/* Subtask */
.subtask{display:flex;align-items:center;gap:8px;padding:6px 0}
.mini-box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--text4);display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent;flex-shrink:0}
.mini-box.done{background:var(--accent);border-color:var(--accent)}
.sub-text{flex:1;font-size:13px;color:#cbd5e1;cursor:pointer;line-height:1.4}
.sub-text.done{text-decoration:line-through;opacity:.5}
.sub-input{flex:1;background:var(--border);border:none;color:var(--text);font-size:13px;padding:4px 8px;border-radius:6px}
.sub-del{background:none;border:none;color:var(--text5);font-size:16px}
.add-sub-row{display:flex;gap:6px;margin-top:10px}
.add-sub-input{flex:1;background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:12px;padding:10px 12px;border-radius:10px}
.add-sub-btn{background:var(--accent);border:none;color:#fff;font-size:16px;width:36px;height:36px;border-radius:10px}
.del-btn{margin-top:28px;background:none;border:1px solid rgba(239,68,68,.3);color:var(--red);font-size:12px;padding:12px;border-radius:10px;width:100%;letter-spacing:1px;font-weight:600}

/* Modal */
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:12px 20px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:19px;font-weight:700;color:#f1f5f9;margin-bottom:18px}
.field-label{font-size:9px;color:var(--text5);letter-spacing:2px;font-weight:800;margin-bottom:6px}
.input{width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:16px;padding:14px 16px;border-radius:12px;margin-bottom:14px}
.time-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:14px}
.time-field{flex:1;min-width:0}
.time-input{width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:14px;padding:12px;border-radius:10px}
.time-sep{color:var(--text4);font-size:16px;margin-top:20px;padding:0 4px}
.est-pill{background:var(--accent);color:#fff;font-size:11px;padding:6px 12px;border-radius:8px;font-weight:700;margin-top:20px;white-space:nowrap;align-self:flex-start}
.textarea{width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:12px 14px;border-radius:12px;margin-bottom:14px;font-family:'JetBrains Mono',monospace;resize:vertical;line-height:1.5}
.color-row{display:flex;gap:12px;margin-bottom:18px}
.color-dot{width:30px;height:30px;border-radius:50%;border:none}
.color-dot.active{outline:2px solid var(--text);outline-offset:3px}
.modal-actions{display:flex;gap:10px}
.cancel-btn{flex:1;background:none;border:1px solid var(--border2);color:var(--text3);font-size:15px;padding:14px;border-radius:12px;font-weight:500}
.save-btn{flex:1;background:var(--accent);border:none;color:#fff;font-size:15px;padding:14px;border-radius:12px;font-weight:700}

/* Calendar */
.cal-modal{background:var(--surface);border-radius:20px 20px 0 0;padding:12px 20px 28px;width:100%;max-width:480px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{background:none;border:none;color:var(--text3);font-size:24px;padding:4px 12px}
.cal-nav-title{font-size:16px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-day-label{font-size:10px;color:var(--text5);padding:6px 0;letter-spacing:1px;font-weight:700}
.cal-day{border:none;border-radius:10px;padding:10px 0;font-size:14px;cursor:pointer;font-weight:500;background:transparent;color:var(--text)}
.cal-day.selected{background:var(--accent);color:#fff}
.cal-day.today{background:rgba(99,102,241,.15)}

/* ─── ALARM ─── */
.alarm-overlay{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.alarm-bg{position:absolute;inset:0;background:var(--bg);animation:alarmPulse 1.5s ease-in-out infinite}
@keyframes alarmPulse{0%,100%{background:#08090e}50%{background:#1a0a2e}}
.alarm-content{position:relative;z-index:1}
.alarm-icon{font-size:72px;margin-bottom:20px;animation:alarmBounce 0.6s ease-in-out infinite alternate}
@keyframes alarmBounce{0%{transform:scale(1)}100%{transform:scale(1.15)}}
.alarm-time{font-size:48px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:3px;font-family:'SF Mono','JetBrains Mono',monospace;margin-bottom:8px}
.alarm-event-title{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:4px;max-width:320px}
.alarm-event-range{font-size:14px;color:var(--text2);margin-bottom:40px}
.alarm-actions{display:flex;gap:16px}
.alarm-dismiss{padding:16px 40px;border-radius:16px;border:none;font-size:18px;font-weight:700;background:var(--red);color:#fff}
.alarm-snooze{padding:16px 32px;border-radius:16px;border:2px solid var(--text4);font-size:18px;font-weight:600;background:none;color:var(--text)}

/* Scrollbar */
.timeline::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── Utilities ───
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const fmtT=s=>{if(s<0)s=0;const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?`${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`:`${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`};
const to12=t=>{if(!t)return"";const[h,m]=t.split(":").map(Number);const ap=h>=12?"PM":"AM";return`${h===0?12:h>12?h-12:h}:${String(m).padStart(2,"0")} ${ap}`};
const toMin=t=>{if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m};
const durStr=(s,e)=>{if(!s||!e)return"";let d=toMin(e)-toMin(s);if(d<=0)d+=1440;const h=Math.floor(d/60),m=d%60;return h>0&&m>0?`${h}h ${m}m`:h>0?`${h}h`:`${m}m`};
const durSec=(s,e)=>{if(!s||!e)return 0;let d=toMin(e)-toMin(s);if(d<=0)d+=1440;return d*60};
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ─── Storage ───
const store={
  get(key){try{return JSON.parse(localStorage.getItem(key))}catch(e){return null}},
  set(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}},
};
const getEvents=date=>store.get(`ev:${date}`)||[];
const setEvents=(date,evs)=>store.set(`ev:${date}`,evs);

// ─── Markdown ───
function renderMd(text){
  if(!text)return"";
  const lines=text.split("\n");let html="",i=0;
  while(i<lines.length){
    const L=lines[i];
    if(L.startsWith("```")){const c=[];i++;while(i<lines.length&&!lines[i].startsWith("```")){c.push(esc(lines[i]));i++;}i++;html+=`<pre class="md-code">${c.join("\n")}</pre>`;continue;}
    if(L.startsWith("### "))html+=`<div class="md-h3">${inlineMd(L.slice(4))}</div>`;
    else if(L.startsWith("## "))html+=`<div class="md-h2">${inlineMd(L.slice(3))}</div>`;
    else if(L.startsWith("# "))html+=`<div class="md-h1">${inlineMd(L.slice(2))}</div>`;
    else if(L.match(/^[-*] /))html+=`<div class="md-li">• ${inlineMd(L.slice(2))}</div>`;
    else if(L.match(/^\d+\. /)){const n=L.match(/^(\d+)\. /);html+=`<div class="md-li">${n[1]}. ${inlineMd(L.slice(n[0].length))}</div>`;}
    else if(L.trim()==="")html+=`<div style="height:8px"></div>`;
    else html+=`<div class="md-p">${inlineMd(L)}</div>`;
    i++;
  }
  return html;
}
function inlineMd(t){
  return esc(t)
    .replace(/`([^`]+)`/g,'<code class="md-inline">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/_([^_]+)_/g,'<em>$1</em>');
}

// ─── Audio Alarm ───
let audioCtx=null;
let alarmOscillators=[];
function startAlarmSound(){
  try{
    audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();
    function beep(){
      if(!audioCtx)return;
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.type="sine";o.frequency.value=880;
      g.gain.setValueAtTime(0.3,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.5);
      o.start();o.stop(audioCtx.currentTime+0.5);
      alarmOscillators.push(o);
    }
    beep();
    window._alarmInterval=setInterval(()=>{beep();if(navigator.vibrate)navigator.vibrate([200,100,200]);},1200);
    if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
  }catch(e){console.log("Audio error:",e)}
}
function stopAlarmSound(){
  if(window._alarmInterval)clearInterval(window._alarmInterval);
  alarmOscillators.forEach(o=>{try{o.stop()}catch(e){}});
  alarmOscillators=[];
  if(navigator.vibrate)navigator.vibrate(0);
}

// ─── App State ───
let state={
  selectedDate:fmt(new Date()),
  events:[],
  view:"timeline", // timeline | sheet | modal | calendar
  activeEventId:null,
  editEvent:null,
  editingDesc:false,
  descDraft:"",
  newSubText:"",
  alarmEvent:null,
  snoozed:{}, // eventId -> snooze until timestamp
  timers:{}, // eventId -> {running, startedAt, mode}
};

function setState(partial){
  Object.assign(state,partial);
  render();
}

// ─── Alarm Check ───
function checkAlarms(){
  const now=new Date();
  const today=fmt(now);
  const events=getEvents(today);
  const currentMin=now.getHours()*60+now.getMinutes();
  
  for(const ev of events){
    if(!ev.alarm||ev.done)continue;
    const evMin=toMin(ev.startTime);
    if(Math.abs(currentMin-evMin)<=0){
      if(state.snoozed[ev.id]&&Date.now()<state.snoozed[ev.id])continue;
      if(state.alarmEvent&&state.alarmEvent.id===ev.id)continue;
      triggerAlarm(ev);
      break;
    }
  }
}
function triggerAlarm(ev){
  state.alarmEvent=ev;
  startAlarmSound();
  render();
}
function dismissAlarm(){
  stopAlarmSound();
  state.alarmEvent=null;
  render();
}
function snoozeAlarm(){
  if(state.alarmEvent){
    state.snoozed[state.alarmEvent.id]=Date.now()+5*60*1000;
    stopAlarmSound();
    state.alarmEvent=null;
    render();
  }
}
setInterval(checkAlarms,15000);
setTimeout(checkAlarms,2000);

// ─── Timer Logic ───
let timerInterval=null;
function startTimerTick(){
  if(timerInterval)return;
  timerInterval=setInterval(()=>{
    let changed=false;
    for(const[id,t]of Object.entries(state.timers)){
      if(t.running){
        const elapsed=Math.floor((Date.now()-t.startedAt)/1000)+t.baseElapsed;
        const ev=state.events.find(e=>e.id===id);
        if(ev&&ev.timerElapsed!==elapsed){
          ev.timerElapsed=elapsed;
          changed=true;
          // Auto-stop countdown
          if((ev.timerMode||"stopwatch")==="countdown"){
            const total=durSec(ev.startTime,ev.endTime);
            if(elapsed>=total){
              t.running=false;
              ev.timerElapsed=total;
            }
          }
        }
      }
    }
    if(changed){
      setEvents(state.selectedDate,state.events);
      render();
    }
  },1000);
}
startTimerTick();

function renderTimeline(){
  const SH=5,EH=24,HH=64;
  const now=new Date(),nowMin=now.getHours()*60+now.getMinutes();
  const nowTop=(nowMin-SH*60)/60*HH;
  const totalH=(EH-SH+1)*HH+40;
  
  let hoursHtml="";
  for(let h=SH;h<=EH;h++){
    const lbl=h===0?"12 AM":h<12?`${h} AM`:h===12?"12 PM":`${h-12} PM`;
    hoursHtml+=`<div class="hour-row" style="top:${(h-SH)*HH}px"><div class="hour-label">${lbl}</div><div class="hour-line"></div></div>`;
  }
  
  let nowHtml="";
  if(state.selectedDate===fmt(new Date())&&nowMin>=SH*60){
    nowHtml=`<div class="now-line" style="top:${nowTop}px"><div class="now-dot"></div><div class="now-bar"></div></div>`;
  }
  
  let evsHtml="";
  state.events.forEach(ev=>{
    const start=toMin(ev.startTime);
    let end=toMin(ev.endTime);if(end<=start)end=start+60;
    const top=(start-SH*60)/60*HH;
    const height=Math.max(32,(end-start)/60*HH);
    const c=ev.color||"#6366f1";
    const subsDone=(ev.subtasks||[]).filter(s=>s.done).length;
    const subsTotal=(ev.subtasks||[]).length;
    evsHtml+=`<button class="ev-block" onclick="openSheet('${ev.id}')" style="top:${top+1}px;height:${Math.max(32,height-2)}px;background:${ev.done?"#111520":c+"15"};border-left:3px solid ${c};border:1px solid ${c}30;border-left:3px solid ${c};opacity:${ev.done?0.45:1}">
      <div class="ev-row"><div class="ev-check ${ev.done?"done":""}">${ev.done?'<span style="color:#fff;font-size:8px">✓</span>':""}</div><span class="ev-title ${ev.done?"done":""}">${esc(ev.title)}</span></div>
      ${height>38?`<div class="ev-meta">${to12(ev.startTime)} – ${to12(ev.endTime)} · ${durStr(ev.startTime,ev.endTime)}${ev.alarm?' · 🔔':''}</div>`:""}
      ${height>58&&subsTotal>0?`<div class="ev-subs">${subsDone}/${subsTotal} subtasks</div>`:""}
    </button>`;
  });
  
  return`<div class="timeline" id="timeline"><div class="timeline-inner" style="height:${totalH}px">${hoursHtml}${nowHtml}${evsHtml}</div></div>`;
}

function renderEventSheet(){
  const ev=state.events.find(e=>e.id===state.activeEventId);
  if(!ev)return"";
  const est=durStr(ev.startTime,ev.endTime);
  const subsDone=(ev.subtasks||[]).filter(s=>s.done).length;
  const subsTotal=(ev.subtasks||[]).length;
  const mode=ev.timerMode||"stopwatch";
  const elapsed=ev.timerElapsed||0;
  const total=durSec(ev.startTime,ev.endTime);
  const display=mode==="countdown"?Math.max(0,total-elapsed):elapsed;
  const finished=mode==="countdown"&&elapsed>=total;
  const pct=mode==="countdown"&&total>0?Math.min(100,(elapsed/total)*100):0;
  const t=state.timers[ev.id];
  const running=t&&t.running;

  let subsHtml=(ev.subtasks||[]).map(sub=>`
    <div class="subtask">
      <button class="mini-check" onclick="toggleSub('${ev.id}','${sub.id}')"><div class="mini-box ${sub.done?"done":""}">${sub.done?'<span style="color:#fff;font-size:10px">✓</span>':""}</div></button>
      <span class="sub-text ${sub.done?"done":""}" onclick="editSubInline(this,'${ev.id}','${sub.id}')">${esc(sub.title)}</span>
      <button class="sub-del" onclick="deleteSub('${ev.id}','${sub.id}')">×</button>
    </div>`).join("");

  return`<div class="overlay" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="big-check" onclick="toggleEventDone('${ev.id}')"><div class="big-box ${ev.done?"done":""}">${ev.done?'<span style="color:#fff;font-size:16px">✓</span>':""}</div></button>
      <div style="flex:1">
        <div class="sheet-title ${ev.done?"done-text":""}">${esc(ev.title)}</div>
        <div class="sheet-timeline"><span style="color:${ev.color||"#6366f1"}">●</span> ${to12(ev.startTime)} — ${to12(ev.endTime)}${est?` <span class="est-badge">${est}</span>`:""}</div>
        ${subsTotal>0?`<div class="sub-progress">${subsDone}/${subsTotal} subtasks</div>`:""}
      </div>
      <button class="edit-btn" onclick="openEditModal('${ev.id}')">✎</button>
    </div>
    <div class="sheet-body">
      <div class="section-label">DESCRIPTION</div>
      ${state.editingDesc?`
        <textarea class="desc-edit" id="descDraft" rows="6" placeholder="Supports **bold**, *italic*, code blocks, lists...">${esc(state.descDraft)}</textarea>
        <div class="desc-actions">
          <button class="desc-cancel" onclick="cancelDescEdit()">Cancel</button>
          <button class="desc-save" onclick="saveDescEdit('${ev.id}')">Save</button>
        </div>
      `:`<div class="desc-area" onclick="startDescEdit('${ev.id}')">${ev.description?renderMd(ev.description):'<span class="desc-placeholder">Tap to add description (markdown supported)...</span>'}</div>`}

      <div class="section-label">ALARM</div>
      <div class="alarm-row">
        <div>
          <div class="alarm-label">🔔 Ring at ${to12(ev.startTime)}</div>
          <div class="alarm-sub">Full-screen alarm when event starts</div>
        </div>
        <button class="toggle ${ev.alarm?"on":"off"}" onclick="toggleAlarm('${ev.id}')"><div class="toggle-knob"></div></button>
      </div>

      <div class="section-label">TIMER</div>
      <div class="timer-box">
        <div class="timer-top">
          <button class="mode-btn" onclick="switchTimerMode('${ev.id}')">${mode==="stopwatch"?"⏱ Stopwatch":"⏳ Countdown"}</button>
          ${mode==="countdown"&&total>0?`<span class="timer-total">of ${fmtT(total)}</span>`:""}
        </div>
        ${mode==="countdown"&&total>0?`<div class="countdown-bar"><div class="countdown-fill" style="width:${pct}%;background:${finished?"var(--red)":"var(--accent)"}"></div></div>`:""}
        <div class="timer-controls">
          <div class="timer-display ${finished?"finished":""}">${finished?"DONE":fmtT(display)}</div>
          <div class="timer-btns">
            <button class="t-btn" style="background:${running?"var(--red)":"var(--green)"}" onclick="toggleTimer('${ev.id}')">${running?"⏸":"▶"}</button>
            <button class="t-btn" style="background:#334155" onclick="resetTimer('${ev.id}')">↺</button>
          </div>
        </div>
      </div>

      <div class="section-label">SUBTASKS</div>
      ${subsHtml}
      <div class="add-sub-row">
        <input class="add-sub-input" id="newSubInput" placeholder="Add subtask..." onkeydown="if(event.key==='Enter')addSub('${ev.id}')">
        <button class="add-sub-btn" onclick="addSub('${ev.id}')">+</button>
      </div>

      <button class="del-btn" onclick="deleteEvent('${ev.id}')">Delete Event</button>
    </div>
  </div></div>`;
}

function renderCalendar(){
  const sel=state.selectedDate;
  const d=new Date(sel+"T00:00:00");
  // Use state._calView or default to selected date's month
  const cv=state._calView||{y:d.getFullYear(),m:d.getMonth()};
  const y=cv.y,m=cv.m;
  const firstDay=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const today=fmt(new Date());
  let cells="";
  for(let i=0;i<firstDay;i++)cells+=`<div></div>`;
  for(let dd=1;dd<=dim;dd++){
    const ds=fmt(new Date(y,m,dd));
    const cls=ds===sel?"selected":ds===today?"today":"";
    cells+=`<button class="cal-day ${cls}" onclick="pickDate('${ds}')">${dd}</button>`;
  }
  return`<div class="overlay" onclick="closeCal()"><div class="cal-modal" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <span class="cal-nav-title">${MONTHS[m]} ${y}</span>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">${DAYS.map(d=>`<div class="cal-day-label">${d}</div>`).join("")}${cells}</div>
  </div></div>`;
}

// ─── Main Render ───
function render(){
  const sel=new Date(state.selectedDate+"T00:00:00");
  const isToday=state.selectedDate===fmt(new Date());
  const done=state.events.filter(e=>e.done).length;
  const pct=state.events.length?Math.round(done/state.events.length*100):0;

  const dayStrip=[-2,-1,0,1,2].map(off=>{
    const d=new Date(state.selectedDate+"T00:00:00");
    d.setDate(d.getDate()+off);
    const ds=fmt(d);
    const active=ds===state.selectedDate;
    const isT=ds===fmt(new Date());
    return`<button class="day-pill ${active?"active":""}" onclick="goDate('${ds}')">
      <div class="dw">${DAYS[d.getDay()]}</div>
      <div class="dn">${d.getDate()}</div>
      ${isT?'<div class="today-dot"></div>':""}
    </button>`;
  }).join("");

  const progHtml=state.events.length>0?`<div class="prog-area">
    <div class="prog-header"><span class="prog-label">PROGRESS</span><span class="prog-val" style="color:${pct===100?"var(--green)":"var(--text3)"}">${done}/${state.events.length} · ${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill ${pct===100?"done":""}" style="width:${pct}%"></div></div>
  </div>`:"";

  const contentHtml=state.events.length===0?
    `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No events scheduled</div><div class="empty-sub">Tap + to add your first event</div></div>`:
    renderTimeline();

  document.getElementById("app").innerHTML=`
    <div class="top-bar">
      <div><div class="brand">⚡ QUEST LOG</div><div class="date-title">${isToday?"Today":DAYS[sel.getDay()]}, ${MONTHS[sel.getMonth()].slice(0,3)} ${sel.getDate()}, ${sel.getFullYear()}</div></div>
      <button class="cal-btn" onclick="openCal()"><div class="cal-btn-month">${MONTHS[sel.getMonth()].slice(0,3).toUpperCase()}</div><div class="cal-btn-day">${sel.getDate()}</div></button>
    </div>
    <div class="day-nav">
      <button class="day-nav-btn" onclick="goDay(-1)">‹</button>
      ${dayStrip}
      <button class="day-nav-btn" onclick="goDay(1)">›</button>
    </div>
    ${progHtml}
    ${contentHtml}
    <button class="fab" onclick="openNewModal()">+</button>
    ${state.view==="sheet"?renderEventSheet():""}
    ${state.view==="modal"?renderModal():""}
    ${state.view==="calendar"?renderCalendar():""}
    ${state.alarmEvent?renderAlarm():""}
  `;

  // Auto-scroll timeline
  if(state.events.length>0&&state.view==="timeline"){
    const tl=document.getElementById("timeline");
    if(tl&&!tl._scrolled){
      const now=new Date();
      const nowTop=((now.getHours()*60+now.getMinutes())-5*60)/60*64;
      tl.scrollTop=Math.max(0,nowTop-150);
      tl._scrolled=true;
    }
  }

  // Update est pill live
  if(state.view==="modal"){
    const sI=document.getElementById("evStart"),eI=document.getElementById("evEnd"),pill=document.getElementById("estPill");
    if(sI&&eI&&pill){
      const update=()=>{pill.textContent=durStr(sI.value,eI.value)||"—"};
      sI.onchange=update;eI.onchange=update;
    }
  }
}

// ─── Actions ───
function goDay(off){
  const d=new Date(state.selectedDate+"T00:00:00");
  d.setDate(d.getDate()+off);
  const ds=fmt(d);
  state.selectedDate=ds;state.events=getEvents(ds);state.view="timeline";state.activeEventId=null;
  render();
  const tl=document.getElementById("timeline");if(tl)tl._scrolled=false;
}
function goDate(ds){
  state.selectedDate=ds;state.events=getEvents(ds);state.view="timeline";state.activeEventId=null;
  render();
  const tl=document.getElementById("timeline");if(tl)tl._scrolled=false;
}

function openSheet(id){state.view="sheet";state.activeEventId=id;state.editingDesc=false;render();}
function closeSheet(){state.view="timeline";state.activeEventId=null;state.editingDesc=false;render();}
function openNewModal(){state.view="modal";state.editEvent={};state._pickedColor="#6366f1";render();}
function openEditModal(id){
  const ev=state.events.find(e=>e.id===id);
  if(ev){state.view="modal";state.editEvent={...ev};state._pickedColor=ev.color||"#6366f1";render();}
}
function closeModal(){state.view="timeline";state.editEvent=null;render();}
function openCal(){
  const d=new Date(state.selectedDate+"T00:00:00");
  state._calView={y:d.getFullYear(),m:d.getMonth()};
  state.view="calendar";render();
}
function closeCal(){state.view="timeline";render();}
function calNav(off){
  state._calView.m+=off;
  if(state._calView.m>11){state._calView.m=0;state._calView.y++;}
  if(state._calView.m<0){state._calView.m=11;state._calView.y--;}
  render();
}
function pickDate(ds){state.selectedDate=ds;state.events=getEvents(ds);state.view="timeline";render();const tl=document.getElementById("timeline");if(tl)tl._scrolled=false;}
function pickColor(c){state._pickedColor=c;document.querySelectorAll(".color-dot").forEach(d=>{d.classList.toggle("active",d.style.background===c)});}

function saveEvent(){
  const title=document.getElementById("evTitle").value.trim();
  if(!title)return;
  const startTime=document.getElementById("evStart").value;
  const endTime=document.getElementById("evEnd").value;
  const description=document.getElementById("evDesc").value;
  const isEdit=state.editEvent&&state.editEvent.id;
  const ev={
    id:isEdit?state.editEvent.id:uid(),
    title,startTime,endTime,description,
    color:state._pickedColor||"#6366f1",
    done:isEdit?state.editEvent.done:false,
    subtasks:isEdit?state.editEvent.subtasks:[],
    timerElapsed:isEdit?state.editEvent.timerElapsed:0,
    timerMode:isEdit?state.editEvent.timerMode:"stopwatch",
    alarm:isEdit?state.editEvent.alarm:true,
  };
  if(isEdit){state.events=state.events.map(e=>e.id===ev.id?ev:e);}
  else{state.events.push(ev);}
  state.events.sort((a,b)=>(a.startTime||"").localeCompare(b.startTime||""));
  setEvents(state.selectedDate,state.events);
  state.view="timeline";state.editEvent=null;
  render();
}

function deleteEvent(id){
  state.events=state.events.filter(e=>e.id!==id);
  setEvents(state.selectedDate,state.events);
  state.view="timeline";state.activeEventId=null;
  render();
}

function toggleEventDone(id){
  const ev=state.events.find(e=>e.id===id);
  if(ev){ev.done=!ev.done;setEvents(state.selectedDate,state.events);render();}
}

function toggleAlarm(id){
  const ev=state.events.find(e=>e.id===id);
  if(ev){ev.alarm=!ev.alarm;setEvents(state.selectedDate,state.events);render();}
}

// Timer
function toggleTimer(id){
  const ev=state.events.find(e=>e.id===id);if(!ev)return;
  if(!state.timers[id])state.timers[id]={running:false,startedAt:0,baseElapsed:0};
  const t=state.timers[id];
  if(t.running){
    t.running=false;
    t.baseElapsed=ev.timerElapsed||0;
  }else{
    t.baseElapsed=ev.timerElapsed||0;
    t.startedAt=Date.now();
    t.running=true;
  }
  render();
}
function resetTimer(id){
  const ev=state.events.find(e=>e.id===id);if(!ev)return;
  ev.timerElapsed=0;
  state.timers[id]={running:false,startedAt:0,baseElapsed:0};
  setEvents(state.selectedDate,state.events);render();
}
function switchTimerMode(id){
  const ev=state.events.find(e=>e.id===id);if(!ev)return;
  if(state.timers[id])state.timers[id]={running:false,startedAt:0,baseElapsed:0};
  ev.timerMode=(ev.timerMode||"stopwatch")==="stopwatch"?"countdown":"stopwatch";
  ev.timerElapsed=0;
  setEvents(state.selectedDate,state.events);render();
}

// Subtasks
function toggleSub(evId,subId){
  const ev=state.events.find(e=>e.id===evId);if(!ev)return;
  const sub=(ev.subtasks||[]).find(s=>s.id===subId);
  if(sub){sub.done=!sub.done;setEvents(state.selectedDate,state.events);render();}
}
function deleteSub(evId,subId){
  const ev=state.events.find(e=>e.id===evId);if(!ev)return;
  ev.subtasks=(ev.subtasks||[]).filter(s=>s.id!==subId);
  setEvents(state.selectedDate,state.events);render();
}
function addSub(evId){
  const input=document.getElementById("newSubInput");if(!input)return;
  const val=input.value.trim();if(!val)return;
  const ev=state.events.find(e=>e.id===evId);if(!ev)return;
  if(!ev.subtasks)ev.subtasks=[];
  ev.subtasks.push({id:uid(),title:val,done:false});
  setEvents(state.selectedDate,state.events);
  state.newSubText="";render();
  setTimeout(()=>{const i=document.getElementById("newSubInput");if(i)i.focus();},50);
}
function editSubInline(el,evId,subId){
  const ev=state.events.find(e=>e.id===evId);if(!ev)return;
  const sub=(ev.subtasks||[]).find(s=>s.id===subId);if(!sub)return;
  const input=document.createElement("input");
  input.className="sub-input";input.value=sub.title;
  el.replaceWith(input);input.focus();
  const save=()=>{sub.title=input.value.trim()||sub.title;setEvents(state.selectedDate,state.events);render();};
  input.onblur=save;input.onkeydown=e=>{if(e.key==="Enter")save();};
}

// Description
function startDescEdit(id){
  const ev=state.events.find(e=>e.id===id);if(!ev)return;
  state.editingDesc=true;state.descDraft=ev.description||"";render();
  setTimeout(()=>{const t=document.getElementById("descDraft");if(t){t.focus();t.selectionStart=t.value.length;}},50);
}
function cancelDescEdit(){state.editingDesc=false;render();}
function saveDescEdit(id){
  const ev=state.events.find(e=>e.id===id);if(!ev)return;
  const t=document.getElementById("descDraft");
  ev.description=t?t.value:"";
  state.editingDesc=false;
  setEvents(state.selectedDate,state.events);render();
}

});

function showInstallBanner(){
  if(document.getElementById('installBanner'))return;
  const banner=document.createElement('div');
  banner.id='installBanner';
  banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#111520;border-top:1px solid #1e2330;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:9998;max-width:480px;margin:0 auto';
  banner.innerHTML='<div style="display:flex;align-items:center;gap:10px"><div style="font-size:24px">⚡</div><div><div style="font-size:13px;font-weight:600;color:#f1f5f9">Install Quest Log</div><div style="font-size:11px;color:#64748b">Add to home screen for the full experience</div></div></div><div style="display:flex;gap:8px"><button onclick="dismissInstall()" style="background:none;border:none;color:#64748b;font-size:12px;padding:8px;cursor:pointer">Later</button><button onclick="installApp()" style="background:#6366f1;border:none;color:#fff;font-size:12px;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer">Install</button></div>';
  document.body.appendChild(banner);
}

function installApp(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;dismissInstall();});
}

function dismissInstall(){
  const b=document.getElementById('installBanner');
  if(b)b.remove();
}
</script>
</body>
</html>
