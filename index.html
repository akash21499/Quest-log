<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090e">
<title>Quest Log</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#08090e;--s1:#0d0f16;--s2:#111520;--s3:#141824;--bd:#1a1f2e;--bd2:#1e2330;--t1:#f1f5f9;--t2:#e2e8f0;--t3:#cbd5e1;--t4:#94a3b8;--t5:#64748b;--t6:#475569;--t7:#334155;--ac:#6366f1;--ac2:#818cf8;--ac3:#a5b4fc;--grn:#22c55e;--red:#ef4444;--yel:#f59e0b}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t2);font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif}
#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
input,textarea,button,select{font-family:inherit;outline:none}
button{cursor:pointer;-webkit-user-select:none;user-select:none}
::-webkit-scrollbar{width:0}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 6px;background:var(--bg);flex-shrink:0}
.brand{font-size:9px;letter-spacing:3px;color:var(--ac);font-weight:800;margin-bottom:2px}
.dtitle{font-size:17px;font-weight:700;color:var(--t1)}
.topright{display:flex;gap:6px;align-items:center}
.tbtn2{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;color:var(--t4);font-size:13px}
.vtog{display:flex;background:var(--s2);border-radius:7px;border:1px solid var(--bd2);overflow:hidden}
.vtog button{padding:5px 10px;border:none;background:none;color:var(--t5);font-size:9px;font-weight:700;letter-spacing:1px}
.vtog button.on{background:var(--ac);color:#fff}

.dstrip{display:flex;align-items:center;justify-content:center;gap:2px;padding:3px 6px 5px;flex-shrink:0}
.dstrip-btn{background:none;border:none;color:var(--t7);font-size:18px;padding:3px 5px}
.dp{display:flex;flex-direction:column;align-items:center;padding:4px 8px;border-radius:11px;border:none;background:transparent;color:var(--t5);min-width:36px}
.dp.on{background:var(--ac);color:#fff}
.dp .dw{font-size:8px;font-weight:600;letter-spacing:.5px}
.dp .dn{font-size:14px;font-weight:700;line-height:1.2}
.dp .td{width:3px;height:3px;border-radius:2px;background:var(--ac);margin-top:1px}
.dp.on .td{background:#fff}

.pbar-wrap{padding:0 14px 5px;flex-shrink:0}
.pbar-hdr{display:flex;justify-content:space-between;margin-bottom:2px}
.pbar-lbl{font-size:8px;color:var(--t6);letter-spacing:1px;font-weight:700}
.pbar-v{font-size:8px;color:var(--t5);font-weight:600}
.pbar{height:2px;background:var(--s3);border-radius:2px;overflow:hidden}
.pbar-f{height:100%;border-radius:2px;transition:width .4s;background:linear-gradient(90deg,var(--ac),var(--ac3))}

/* Timeline */
.tlw{flex:1;overflow:hidden;position:relative}
.tls{height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.tli{position:relative}
.hrow{position:absolute;left:0;right:0}
.hlbl{position:absolute;left:3px;top:-6px;font-size:8px;color:#1e2640;width:36px;text-align:right;font-weight:500}
.hline{position:absolute;left:42px;right:0;top:0;height:1px;background:var(--s2)}
.nowl{position:absolute;left:40px;right:0;z-index:5;display:flex;align-items:center;pointer-events:none}
.nowd{width:6px;height:6px;border-radius:3px;background:var(--red)}
.nowb{flex:1;height:1.5px;background:var(--red)}

.evb{position:absolute;left:46px;right:5px;border-radius:5px;padding:3px 7px;cursor:pointer;border:none;text-align:left;overflow:hidden;touch-action:none}
.evb.drag{opacity:.85;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:scale(1.02)}
.evb .er{display:flex;align-items:center;gap:4px}
.evb .eck{width:11px;height:11px;border-radius:2px;border:1.5px solid var(--t6);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.evb .eck.dn{background:var(--grn);border-color:var(--grn)}
.evb .eti{font-size:11px;font-weight:600;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evb .eti.dn{text-decoration:line-through;opacity:.5}
.evb .em{font-size:8px;color:var(--t5);margin-top:1px;padding-left:15px}

.dprev{position:fixed;left:14px;top:50%;transform:translateY(-50%);background:var(--ac);color:#fff;padding:5px 12px;border-radius:7px;font-size:13px;font-weight:700;z-index:100;pointer-events:none;font-variant-numeric:tabular-nums;box-shadow:0 4px 16px rgba(99,102,241,.4)}

/* Schedule */
.schw{flex:1;overflow-y:auto;padding:6px 10px 80px;-webkit-overflow-scrolling:touch}
.sc{background:var(--s2);border-radius:10px;margin-bottom:8px;overflow:hidden;border:1px solid var(--bd)}
.sc-h{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer}
.sc-ck{width:20px;height:20px;border-radius:5px;border:2px solid var(--t6);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.sc-ck.dn{background:var(--grn);border-color:var(--grn)}
.sc-ti{font-size:13px;font-weight:600;color:var(--t1)}
.sc-ti.dn{text-decoration:line-through;opacity:.45}
.sc-tm{font-size:10px;color:var(--t4);margin-top:1px;display:flex;align-items:center;gap:5px}
.sc-bg{font-size:8px;background:var(--bd);padding:1px 5px;border-radius:3px;color:var(--ac3);font-weight:600}
.sc-b{padding:0 12px 12px}
.sc-desc{background:var(--s3);border-radius:7px;padding:8px 10px;margin-bottom:8px}
.sc-sub{display:flex;align-items:center;gap:7px;padding:4px 0}
.sc-sck{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--t6);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;cursor:pointer;transition:all .15s}
.sc-sck.dn{background:var(--ac);border-color:var(--ac)}
.sc-stxt{font-size:11.5px;color:var(--t3)}
.sc-stxt.dn{text-decoration:line-through;opacity:.4}
.sc-pbar{display:flex;align-items:center;gap:6px;padding:6px 0 2px}
.sc-pb{flex:1;height:2px;background:var(--s3);border-radius:1px;overflow:hidden}
.sc-pf{height:100%;border-radius:1px;background:var(--ac);transition:width .3s}
.sc-pl{font-size:9px;color:var(--t5);font-weight:600}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px}
.fab{position:absolute;bottom:22px;right:14px;width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;color:#fff;font-size:24px;font-weight:300;box-shadow:0 4px 18px rgba(99,102,241,.35);z-index:50;display:flex;align-items:center;justify-content:center}

/* Overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.sht{background:var(--s1);border-radius:16px 16px 0 0;padding:8px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.shandle{width:30px;height:3px;border-radius:2px;background:#262d3d;margin:0 auto 10px}

/* Sheet */
.shdr{display:flex;gap:10px;padding:0 16px 10px;align-items:flex-start}
.bck{background:none;border:none;padding:0;margin-top:2px}
.bbox{width:22px;height:22px;border-radius:5px;border:2px solid var(--t6);display:flex;align-items:center;justify-content:center;transition:all .15s}
.bbox.dn{background:var(--grn);border-color:var(--grn)}
.stti{font-size:16px;font-weight:700;color:var(--t1);line-height:1.3}
.stl{font-size:10px;color:var(--t4);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ebtn{background:var(--s2);border:1px solid var(--bd2);color:var(--t4);width:30px;height:30px;border-radius:7px;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbdy{padding:0 16px 30px}
.slbl{font-size:7px;color:var(--t7);letter-spacing:2px;font-weight:800;margin-top:16px;margin-bottom:5px}

/* Description */
.darea{background:var(--s2);border-radius:7px;padding:10px;min-height:32px;cursor:pointer;border:1px solid var(--s3)}
.dedit{width:100%;background:var(--s2);border:1px solid var(--bd2);color:var(--t2);font-size:11px;padding:8px;border-radius:7px;font-family:'SF Mono',monospace;resize:vertical;line-height:1.6}
.dacts{display:flex;gap:5px;margin-top:5px;justify-content:flex-end}
.dacts button{font-size:10px;padding:4px 12px;border-radius:5px;border:none}
.dcancel{background:none;border:1px solid var(--bd2) !important;color:var(--t4)}
.dsave{background:var(--ac);color:#fff;font-weight:600}

/* Alarm row */
.arow{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-radius:7px;padding:8px 10px;border:1px solid var(--s3)}
.atog{width:38px;height:20px;border-radius:10px;border:none;padding:2px;transition:background .2s}
.atog.on{background:var(--ac)}.atog.off{background:var(--t6)}
.aknob{width:16px;height:16px;border-radius:8px;background:#fff;transition:transform .2s}
.atog.on .aknob{transform:translateX(18px)}

/* Timer */
.tbox{background:var(--s2);border-radius:9px;padding:10px;border:1px solid var(--s3)}
.ttop{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.tmode{background:var(--bd);border:1px solid var(--bd2);color:var(--ac3);font-size:9px;padding:3px 8px;border-radius:5px;font-weight:600}
.cdb{height:2px;background:var(--bd);border-radius:1px;overflow:hidden;margin-bottom:7px}
.cdf{height:100%;border-radius:1px;transition:width 1s linear}
.tctrl{display:flex;align-items:center;justify-content:space-between}
.tdisp{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px;font-family:'SF Mono',monospace;color:var(--t1)}
.tdisp.fin{color:var(--red)}
.tbtns{display:flex;gap:7px}
.tb{width:36px;height:36px;border-radius:50%;border:none;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center}

/* Subtasks */
.si{display:flex;align-items:center;gap:5px;padding:4px 0;transition:background .15s}
.si.sdragging{background:var(--s3);border-radius:6px;opacity:.7}
.sdrag{display:flex;align-items:center;justify-content:center;width:20px;height:20px;color:var(--t7);font-size:14px;touch-action:none;cursor:grab;flex-shrink:0;user-select:none;-webkit-user-select:none}
.sck{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--t6);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;cursor:pointer;transition:all .15s}
.sck.dn{background:var(--ac);border-color:var(--ac)}
.stxt{flex:1;font-size:11.5px;color:var(--t3);cursor:pointer;line-height:1.3}
.stxt.dn{text-decoration:line-through;opacity:.4}
.sdel{background:none;border:none;color:var(--t7);font-size:13px;padding:3px}
.sinp{flex:1;background:var(--bd);border:none;color:var(--t2);font-size:11px;padding:3px 6px;border-radius:4px}
.asr{display:flex;gap:5px;margin-top:6px}
.asin{flex:1;background:var(--s2);border:1px solid var(--bd2);color:var(--t2);font-size:10px;padding:7px 9px;border-radius:7px}
.asbtn{background:var(--ac);border:none;color:#fff;font-size:13px;width:30px;height:30px;border-radius:7px}

.actr{display:flex;gap:6px;margin-top:16px}
.abtn{flex:1;padding:9px;border-radius:7px;font-size:10px;font-weight:600;letter-spacing:.5px;border:none;display:flex;align-items:center;justify-content:center;gap:3px}
.adup{background:var(--s2);border:1px solid var(--bd2);color:var(--ac3)}
.adel{background:none;border:1px solid rgba(239,68,68,.2);color:var(--red)}

/* Modal */
.mdl{background:var(--s1);border-radius:16px 16px 0 0;padding:8px 16px 24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.mtti{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:12px}
.fl{font-size:7px;color:var(--t7);letter-spacing:2px;font-weight:800;margin-bottom:3px}
.fi{width:100%;background:var(--s2);border:1px solid var(--bd2);color:var(--t2);font-size:14px;padding:10px 12px;border-radius:9px;margin-bottom:10px}
.fidate{width:100%;background:var(--s2);border:1px solid var(--bd2);color:var(--t2);font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:10px;text-align:left;cursor:pointer}
.tr{display:flex;align-items:flex-start;gap:5px;margin-bottom:10px}
.tf{flex:1;min-width:0}
.ti{width:100%;background:var(--s2);border:1px solid var(--bd2);color:var(--t2);font-size:12px;padding:9px;border-radius:7px}
.tsep{color:var(--t6);font-size:13px;margin-top:16px;padding:0 2px}
.epill{background:var(--ac);color:#fff;font-size:9px;padding:4px 9px;border-radius:5px;font-weight:700;margin-top:16px;white-space:nowrap}
.fta{width:100%;background:var(--s2);border:1px solid var(--bd2);color:var(--t2);font-size:11px;padding:9px 10px;border-radius:9px;margin-bottom:10px;font-family:'SF Mono',monospace;resize:vertical;line-height:1.5}
.cr{display:flex;gap:9px;margin-bottom:12px}
.cd2{width:26px;height:26px;border-radius:50%;border:none}
.cd2.on{outline:2px solid var(--t2);outline-offset:2px}
.tmode2{padding:5px 10px;border-radius:6px;border:1px solid var(--bd2);background:none;color:var(--t5);font-size:10px;font-weight:600}
.tmode2.tmon{background:var(--ac);color:#fff;border-color:var(--ac)}
.dpreset{padding:5px 10px;border-radius:6px;border:1px solid var(--bd2);background:var(--s2);color:var(--ac3);font-size:10px;font-weight:600}
.macts{display:flex;gap:7px}
.mcan{flex:1;background:none;border:1px solid var(--bd2);color:var(--t5);font-size:13px;padding:11px;border-radius:9px}
.msav{flex:1;background:var(--ac);border:none;color:#fff;font-size:13px;padding:11px;border-radius:9px;font-weight:700}

/* Calendar */
.cmod{background:var(--s1);border-radius:16px 16px 0 0;padding:8px 16px 20px;width:100%;max-width:480px}
.cnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cnav button{background:none;border:none;color:var(--t5);font-size:20px;padding:3px 8px}
.cnav span{font-size:13px;font-weight:700;color:var(--t2)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center}
.cdlbl{font-size:8px;color:var(--t7);padding:4px 0;letter-spacing:1px;font-weight:700}
.cday{border:none;border-radius:7px;padding:7px 0;font-size:12px;cursor:pointer;font-weight:500;background:transparent;color:var(--t2)}
.cday.sel{background:var(--ac);color:#fff}
.cday.tod{background:rgba(99,102,241,.15)}

/* Settings */
.smod{background:var(--s1);border-radius:16px 16px 0 0;padding:8px 16px 24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.smti{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:14px}
.sg{margin-bottom:14px}
.sgl{font-size:7px;color:var(--t7);letter-spacing:2px;font-weight:800;margin-bottom:6px}
.sr{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;background:var(--s2);border-radius:7px;margin-bottom:3px;border:1px solid var(--s3)}
.srl{font-size:12px;color:var(--t2)}
.sr input[type=number]{background:var(--s3);border:1px solid var(--bd2);color:var(--t2);padding:3px 6px;border-radius:5px;font-size:11px;width:50px;text-align:center}
.cpbtn{width:100%;padding:10px;background:var(--s2);border:1px solid var(--bd2);color:var(--ac3);font-size:12px;font-weight:600;border-radius:8px;margin-top:6px}
.sclose{width:100%;padding:11px;background:var(--ac);border:none;color:#fff;font-size:13px;font-weight:700;border-radius:9px;margin-top:12px}

/* Alarm */
.almov{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center}
.almbg{position:absolute;inset:0;background:var(--bg);animation:ap 1.5s ease-in-out infinite}
@keyframes ap{0%,100%{background:#08090e}50%{background:#1a0a2e}}
.almct{position:relative;z-index:1}
.almicon{font-size:56px;margin-bottom:12px;animation:ab .6s ease-in-out infinite alternate}
@keyframes ab{0%{transform:scale(1)}100%{transform:scale(1.12)}}
.almtm{font-size:40px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:2px;font-family:'SF Mono',monospace;margin-bottom:4px}
.almti{font-size:20px;font-weight:700;color:var(--t1);margin-bottom:3px;max-width:280px}
.almrng{font-size:12px;color:var(--t4);margin-bottom:32px}
.almacts{display:flex;gap:12px}
.almsnz{padding:12px 24px;border-radius:12px;border:2px solid var(--t6);font-size:15px;font-weight:600;background:none;color:var(--t2)}
.almdis{padding:12px 30px;border-radius:12px;border:none;font-size:15px;font-weight:700;background:var(--red);color:#fff}

/* Markdown */
.md-h1{font-size:13px;font-weight:700;color:var(--t1);margin:5px 0 2px}
.md-p{font-size:11px;color:var(--t4);line-height:1.6;margin:1px 0}
.md-li{font-size:11px;color:var(--t4);line-height:1.6;padding-left:5px}
.md-code{font-size:9px;background:var(--bd);color:var(--ac3);padding:5px 7px;border-radius:3px;display:block;margin:3px 0;white-space:pre-wrap;font-family:monospace}
.md-inl{font-size:9px;background:var(--bd);color:var(--ac3);padding:1px 3px;border-radius:2px;font-family:monospace}
</style>
</head>
<body>
<div id="app"></div>
<script>
var DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function fmtT(s){if(s<0)s=0;var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+":"+String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0"):String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0")}
function to12(t){if(!t)return"";var p=t.split(":").map(Number);if(getS().use24h)return String(p[0]).padStart(2,"0")+":"+String(p[1]).padStart(2,"0");return(p[0]===0?12:p[0]>12?p[0]-12:p[0])+":"+String(p[1]).padStart(2,"0")+" "+(p[0]>=12?"PM":"AM")}
function toMin(t){if(!t)return 0;var p=t.split(":").map(Number);return p[0]*60+p[1]}
function minToTime(m){var h=Math.floor(m/60)%24;return String(h).padStart(2,"0")+":"+String(m%60).padStart(2,"0")}
function durStr(s,e){if(!s||!e)return"";var d=toMin(e)-toMin(s);if(d<=0)d+=1440;var h=Math.floor(d/60),m=d%60;return h>0&&m>0?h+"h "+m+"m":h>0?h+"h":m+"m"}
function durSec(s,e){if(!s||!e)return 0;var d=toMin(e)-toMin(s);if(d<=0)d+=1440;return d*60}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

var LS={get:function(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}},set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
function getEv(d){return LS.get("ev:"+d)||[]}
function setEv(d,v){LS.set("ev:"+d,v)}
function getS(){return Object.assign({startHour:5,endHour:24,defaultAlarm:true,snoozeMins:5,zoomLevel:64,use24h:false},LS.get("qsettings")||{})}
function setS(s){LS.set("qsettings",s)}

function setupSwipe(){var el=document.getElementById("tlW")||document.querySelector(".schw");if(!el||el._sw)return;el._sw=true;var sx=0,sy=0;el.addEventListener("touchstart",function(e){if(e.touches.length===1){sx=e.touches[0].clientX;sy=e.touches[0].clientY;}},{passive:true});el.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx>0)goDay(-1);else goDay(1);}},{passive:true});}
function setupPinch(){var el=document.getElementById("tlW");if(!el||el._pn)return;el._pn=true;var id=0,iz=S._zoom;el.addEventListener("touchstart",function(e){if(e.touches.length===2){id=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);iz=S._zoom;}},{passive:true});el.addEventListener("touchmove",function(e){if(e.touches.length===2){var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);S._zoom=Math.max(30,Math.min(160,Math.round(iz*(d/id))));render();}},{passive:true});}

function saveEvent(){var ti=(document.getElementById("evTi")||{}).value||"";if(!ti.trim())return;var st=(document.getElementById("evSt")||{}).value||"09:00";var et;if(S._durMode==="dur"){var durIn=document.getElementById("evDur");var mins=durIn?parseInt(durIn.value)||60:60;et=minToTime(toMin(st)+mins);}else{et=(document.getElementById("evEn")||{}).value||"10:00";}var de=(document.getElementById("evDe")||{}).value||"";var dateIn=document.getElementById("evDate");var isE=S.editEv&&S.editEv.id;var se=getS();var targetDate=dateIn?dateIn.value:(S.editEv&&S.editEv._date||S.date);if(!/^\d{4}-\d{2}-\d{2}$/.test(targetDate))targetDate=S.date;var ev={id:isE?S.editEv.id:uid(),title:ti.trim(),startTime:st,endTime:et,description:de,color:S._pickedColor||"#6366f1",done:isE?S.editEv.done:false,subtasks:isE?S.editEv.subtasks:[],timerElapsed:isE?S.editEv.timerElapsed:0,timerMode:isE?S.editEv.timerMode:"stopwatch",alarm:isE?S.editEv.alarm:se.defaultAlarm};if(isE&&targetDate!==S.date){S.events=S.events.filter(function(e){return e.id!==ev.id});setEv(S.date,S.events);var tevs=getEv(targetDate);tevs.push(ev);tevs.sort(function(a,b){return(a.startTime||"").localeCompare(b.startTime||"")});setEv(targetDate,tevs);}else{if(isE)S.events=S.events.map(function(e){return e.id===ev.id?ev:e});else S.events.push(ev);S.events.sort(function(a,b){return(a.startTime||"").localeCompare(b.startTime||"")});setEv(targetDate,S.events);if(targetDate!==S.date){S.date=targetDate;S.events=getEv(targetDate);}}S.overlay=null;S.editEv=null;S._durMode=null;render();}
